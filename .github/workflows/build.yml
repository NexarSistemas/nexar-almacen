name: Build & Release Nexar Almacen

on:
  push:
    branches: [main, master]

permissions:
  contents: write # 👈 ESTO ARREGLA EL 403

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════
  # 🔍 CHECK VERSION + RELEASE
  # ════════════════════════════════════════
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
      tag_exists: ${{ steps.tag.outputs.exists }}
      release_exists: ${{ steps.rel.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Leer versión
        id: ver
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Verificar tag
        id: tag
        run: |
          if git rev-parse "v${{ steps.ver.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Verificar release
        id: rel
        run: |
          if gh release view "v${{ steps.ver.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════
  # 🪟 BUILD WINDOWS
  # ════════════════════════════════════════
  build-windows:
    needs: check
    runs-on: windows-latest
    env:
      PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      LICENSE_PRODUCT: nexar-almacen

    steps:
      - uses: actions/checkout@v4

      - name: Usar versión
        id: ver
        run: echo "VERSION=${{ needs.check.outputs.version }}" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pythonnet

      - name: Preparar LICENSE para Inno Setup
        shell: pwsh
        run: |
          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "build\LICENSE.txt"
          } elseif (Test-Path "LICENSE.md") {
            Copy-Item "LICENSE.md" "build\LICENSE.txt"
          } else {
            "Nexar Almacen License" | Out-File "build\LICENSE.txt"
          }

      - name: Preparar clave pública para Windows
        shell: pwsh
        run: |
          if (!(Test-Path "keys")) {
            New-Item -ItemType Directory -Path "keys" | Out-Null
          }
          if (-not $env:PUBLIC_KEY) {
            throw "PUBLIC_KEY no está definido en el entorno"
          }
          #
          if (-not $env:SECRET_KEY) {
            throw "SECRET_KEY no está definido en los Secrets de GitHub. La aplicación requiere esta clave para iniciar."
          }
          if (-not $env:SUPABASE_URL) {
            throw "SUPABASE_URL no esta definido en los Secrets de GitHub."
          }
          if (-not $env:SUPABASE_ANON_KEY) {
            throw "SUPABASE_ANON_KEY no esta definido en los Secrets de GitHub."
          }
          Set-Content -Path "keys\public_key.asc" -Value $env:PUBLIC_KEY -Encoding UTF8

      - name: Generar archivo .env para compilación
        shell: pwsh
        run: | #
          @(
            "SECRET_KEY=$env:SECRET_KEY"
            "SUPABASE_URL=$env:SUPABASE_URL"
            "SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY"
            "LICENSE_PRODUCT=$env:LICENSE_PRODUCT"
          ) | Out-File -FilePath ".env" -Encoding UTF8

      - name: Build EXE
        run: |
          pyinstaller build/nexar_almacen.spec --distpath dist --workpath build/work --noconfirm

      - name: Asegurar .env en carpeta de distribución
        shell: pwsh
        run: | #
          # Copiar el .env generado a la carpeta dist para que Inno Setup lo incluya
          Copy-Item ".env" "dist\" -Force
          Get-ChildItem -Path "dist" -Directory | ForEach-Object { Copy-Item ".env" "$($_.FullName)\.env" -Force }
          # Para el caso de que el instalador de Inno Setup no copie el .env directamente,
          # nos aseguramos de que esté en cada subdirectorio de la distribución.
          # Esto es un workaround para asegurar que el .env esté accesible para el .exe.
          if (!(Test-Path "dist\.env")) {
            throw "No se pudo copiar .env a dist"
          }

      - name: Instalador Inno Setup
        shell: pwsh
        run: |
          $ver="${{ steps.ver.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$ver" "build\nexar_almacen.iss"

      - name: SHA256 Windows
        shell: pwsh
        run: |
          $out="dist\SHA256SUMS_Windows.txt"
          Get-ChildItem dist -File | Where-Object {$_.Name -notlike "*SHA256*"} | ForEach-Object {
            $h=(Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h  $($_.Name)" | Add-Content $out
          }

      - uses: actions/upload-artifact@v4
        with:
          name: win-${{ steps.ver.outputs.VERSION }}
          path: dist/

  # ════════════════════════════════════════
  # 🐧 BUILD LINUX
  # ════════════════════════════════════════
  build-linux:
    needs: check
    runs-on: ubuntu-latest
    env:
      PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      LICENSE_PRODUCT: nexar-almacen

    steps:
      - uses: actions/checkout@v4

      - name: Usar versión
        id: ver
        run: echo "VERSION=${{ needs.check.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Validar Secret Key
        run: |
          if [ -z "$SECRET_KEY" ]; then echo "Error: SECRET_KEY no definida"; exit 1; fi
          if [ -z "$PUBLIC_KEY" ]; then echo "Error: PUBLIC_KEY no definida"; exit 1; fi
          if [ -z "$SUPABASE_URL" ]; then echo "Error: SUPABASE_URL no definida"; exit 1; fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then echo "Error: SUPABASE_ANON_KEY no definida"; exit 1; fi
        shell: bash

      #
      - name: Crear .env para Linux
        run: |
          {
            echo "SECRET_KEY=$SECRET_KEY"
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            echo "LICENSE_PRODUCT=$LICENSE_PRODUCT"
          } > .env
        shell: bash

      - name: Build Linux
        run: |
          mkdir dist
          chmod +x build_deb.sh
          bash build_deb.sh
          cp build_deb/*.deb dist/ || true

      - name: SHA256 Linux
        run: |
          cd dist
          sha256sum * > SHA256SUMS_Linux.txt

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ steps.ver.outputs.VERSION }}
          path: dist/

  # ════════════════════════════════════════
  # 🔐 FIRMA GPG (FIXED)
  # ════════════════════════════════════════
  sign:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Configurar GPG
        run: |
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Importar clave
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Firmar archivos
        run: |
          find dist -type f ! -name "*.sig" -exec \
          gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --detach-sign {} \;

      - uses: actions/upload-artifact@v4
        with:
          name: signed
          path: dist/

  # ════════════════════════════════════════
  # 🚀 RELEASE INTELIGENTE
  # ════════════════════════════════════════
  release:
    needs: [check, sign]
    if: |
      needs.check.outputs.tag_exists == 'false' ||
      needs.check.outputs.release_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Leer versión
        id: ver
        run: echo "VERSION=${{ needs.check.outputs.version }}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: signed
          path: dist/

      - name: Generar release desde CHANGELOG
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          awk "/## \[$VER\]/,/## \[/" CHANGELOG.md | sed '$d' > release.md

      - name: Crear tag si no existe
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag v${{ steps.ver.outputs.VERSION }} || true
          git push origin v${{ steps.ver.outputs.VERSION }} || true

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}
          name: Nexar Almacen v${{ steps.ver.outputs.VERSION }}
          body_path: release.md
          prerelease: false
          files: dist/**/*
