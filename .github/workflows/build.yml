# ════════════════════════════════════════════════════════════
# .github/workflows/build.yml
# Build + Release inteligente basado en CHANGELOG
# ════════════════════════════════════════════════════════════

name: Build Nexar Almacen

on:
  push:
    branches: [ main, master ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════════════════════════
  # 🔍 CHECK VERSION (CLAVE DEL SISTEMA)
  # ════════════════════════════════════════════════════════════
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Leer versión actual
        id: ver
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Verificar si ya existe tag
        id: check
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          if git rev-parse "v$VER" >/dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Versión ya existe → NO release"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Nueva versión → SE GENERA release"
          fi

  # ════════════════════════════════════════════════════════════
  # 🪟 BUILD WINDOWS
  # ════════════════════════════════════════════════════════════
  build-windows:
    needs: check-version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Usar versión
        id: ver
        run: echo "VERSION=${{ needs.check-version.outputs.version }}" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar deps
        run: |
          python -m pip install --upgrade pip
          pip install flask openpyxl reportlab pywebview pythonnet pyinstaller

      - name: Build EXE
        run: |
          pyinstaller build/nexar_almacen.spec --distpath dist --workpath build/work --noconfirm

      - name: Crear instalador
        shell: pwsh
        run: |
          $ver="${{ steps.ver.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$ver" "build\nexar_almacen.iss"

      - name: SHA256
        shell: pwsh
        run: |
          $out="dist\SHA256SUMS_Windows.txt"
          Get-ChildItem dist -File | Where-Object {$_.Name -notlike "*SHA256*"} | ForEach-Object {
            $h=(Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h  $($_.Name)" | Add-Content $out
          }

      - uses: actions/upload-artifact@v4
        with:
          name: win-${{ steps.ver.outputs.VERSION }}
          path: dist/

  # ════════════════════════════════════════════════════════════
  # 🐧 BUILD LINUX
  # ════════════════════════════════════════════════════════════
  build-linux:
    needs: check-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Usar versión
        id: ver
        run: echo "VERSION=${{ needs.check-version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Build portable + deb
        run: |
          mkdir dist
          chmod +x build_deb.sh
          bash build_deb.sh
          cp build_deb/*.deb dist/

      - name: SHA256
        run: |
          cd dist
          sha256sum * > SHA256SUMS_Linux.txt

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ steps.ver.outputs.VERSION }}
          path: dist/

  # ════════════════════════════════════════════════════════════
  # 🔐 FIRMAR BINARIOS (GPG)
  # ════════════════════════════════════════════════════════════
  sign:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Importar clave GPG
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

      - name: Firmar archivos
        run: |
          find dist -type f ! -name "*.sig" -exec gpg --batch --yes --detach-sign {} \;

      - uses: actions/upload-artifact@v4
        with:
          name: signed
          path: dist/

  # ════════════════════════════════════════════════════════════
  # 🚀 RELEASE AUTOMÁTICA
  # ════════════════════════════════════════════════════════════
  release:
    needs: [check-version, sign]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Leer versión
        id: ver
        run: echo "VERSION=${{ needs.check-version.outputs.version }}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: signed
          path: dist/

      # 🔥 EXTRAER DESDE CHANGELOG
      - name: Generar notas desde CHANGELOG
        id: changelog
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          awk "/## \[$VER\]/,/## \[/" CHANGELOG.md | sed '$d' > release.md

          TITLE=$(head -n 1 release.md | sed 's/## \[.*\] — //')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      # 🏷️ CREAR TAG
      - name: Crear tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag v${{ steps.ver.outputs.VERSION }}
          git push origin v${{ steps.ver.outputs.VERSION }}

      # 🚀 RELEASE
      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}
          name: Nexar Almacen v${{ steps.ver.outputs.VERSION }}
          body_path: release.md
          prerelease: ${{ contains(steps.ver.outputs.VERSION, '-') }}
          files: dist/**/*