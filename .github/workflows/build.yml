# ════════════════════════════════════════════════════════════
# .github/workflows/build.yml
# Pipeline de compilación de Nexar Almacen
#
# Se ejecuta en cada push a main o master.
# Genera los paquetes de distribución para Windows y Linux,
# y un SHA256SUMS.txt con los checksums de todos los archivos.
# ════════════════════════════════════════════════════════════

name: Build Nexar Almacen

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-windows:
    name: Windows (EXE + Instalador + Portable)
    runs-on: windows-latest

    steps:

      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Leer versión desde el archivo VERSION
        id: ver
        shell: bash
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── CAMBIO: se agregaron pywebview y pythonnet ───────────────────
      # pywebview abre la ventana nativa (sin navegador externo)
      # pythonnet es requerido por pywebview en Windows para acceder a .NET
      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install flask==3.0.3 openpyxl reportlab pywebview==4.4 pythonnet pyinstaller==6.19.0

      - name: Compilar EXE con PyInstaller
        run: |
          pyinstaller build/nexar_almacen.spec --distpath dist --workpath build/work --noconfirm

      - name: Verificar que el EXE existe
        shell: pwsh
        run: |
          if (Test-Path "dist\NexarAlmacen.exe") {
            $mb = [math]::Round((Get-Item "dist\NexarAlmacen.exe").Length / 1MB, 1)
            Write-Host "OK — NexarAlmacen.exe generado: $mb MB"
          } else {
            Write-Error "FALLO — NexarAlmacen.exe no encontrado en dist/"
            exit 1
          }

      # ─── CAMBIO: crear LICENSE.txt para que Inno Setup muestre la licencia ───
      # Inno Setup requiere un archivo de texto con extensión .txt o .rtf
      - name: Crear LICENSE.txt para Inno Setup
        shell: pwsh
        run: |
          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "LICENSE.txt"
            Write-Host "OK — LICENSE.txt creado"
          } elseif (Test-Path "LICENSE.md") {
            Copy-Item "LICENSE.md" "LICENSE.txt"
            Write-Host "OK — LICENSE.txt creado desde LICENSE.md"
          } else {
            # Fallback: crear un archivo mínimo para que Inno Setup no falle
            "Nexar Almacen — Todos los derechos reservados. Nexar Sistemas 2026." | Out-File "LICENSE.txt" -Encoding UTF8
            Write-Host "AVISO — LICENSE no encontrado, se creó un archivo mínimo"
          }

      - name: Crear instalador con Inno Setup
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$ver" "build\nexar_almacen.iss"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup falló con código $LASTEXITCODE"
            exit 1
          }

      - name: Renombrar EXE standalone con número de versión
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          Rename-Item "dist\NexarAlmacen.exe" "NexarAlmacen_${ver}_Windows_Standalone.exe"

      - name: Crear ZIP portable Windows
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path "portable_tmp\NexarAlmacen" | Out-Null
          $archivos = @(
            "app.py", "database.py", "iniciar.py", "openfoodfacts.py",
            "productos_seed.py", "license_verifier.py"
          )
          foreach ($f in $archivos) {
            if (Test-Path $f) { Copy-Item $f "portable_tmp\NexarAlmacen\" }
          }
          $docs = @("VERSION", "CHANGELOG.md", "README.md", "requirements.txt", "LICENSE")
          foreach ($f in $docs) {
            if (Test-Path $f) { Copy-Item $f "portable_tmp\NexarAlmacen\" }
          }
          $carpetas = @("templates", "static", "services", "keys")
          foreach ($d in $carpetas) {
            if (Test-Path $d) { Copy-Item $d "portable_tmp\NexarAlmacen\" -Recurse }
          }
          Compress-Archive -Path "portable_tmp\NexarAlmacen" `
            -DestinationPath "dist\NexarAlmacen_${ver}_Windows_Portable.zip" -Force
          Remove-Item "portable_tmp" -Recurse -Force
          Write-Host "OK — ZIP portable Windows creado"

      - name: Generar SHA256SUMS_Windows.txt
        shell: pwsh
        run: |
          $outFile = "dist\SHA256SUMS_Windows.txt"
          $archivos = Get-ChildItem "dist" -File | Where-Object { $_.Name -notlike "*SHA256*" }
          foreach ($f in $archivos) {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($f.Name)" | Add-Content $outFile
          }
          Write-Host "--- SHA256SUMS Windows ---"
          Get-Content $outFile

      - name: Subir artefactos Windows
        uses: actions/upload-artifact@v4
        with:
          name: nexar-almacen-windows-${{ steps.ver.outputs.VERSION }}
          path: dist/
          retention-days: 30

  build-linux:
    name: Linux (ZIP Portable + .deb)
    runs-on: ubuntu-latest

    steps:

      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Leer versión desde el archivo VERSION
        id: ver
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      # ─── CAMBIO: instalar dependencias de sistema para que el .deb
      # pueda listar webkit2gtk en sus Depends correctamente ──────────────
      - name: Instalar dependencias de sistema para pywebview
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            python3-gi \
            python3-gi-cairo \
            libgtk-3-0 \
            libwebkit2gtk-4.1
          echo "OK — dependencias de sistema instaladas"

      - name: Crear carpeta de distribución
        run: mkdir -p dist

      - name: Crear ZIP portable Linux
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          mkdir -p portable_tmp/NexarAlmacen
          for f in app.py database.py iniciar.py openfoodfacts.py \
                   productos_seed.py license_verifier.py; do
            [ -f "$f" ] && cp "$f" portable_tmp/NexarAlmacen/
          done
          for f in VERSION CHANGELOG.md README.md requirements.txt LICENSE; do
            [ -f "$f" ] && cp "$f" portable_tmp/NexarAlmacen/
          done
          for d in templates static services keys; do
            [ -d "$d" ] && cp -r "$d" portable_tmp/NexarAlmacen/
          done
          cd portable_tmp
          zip -r "../dist/NexarAlmacen_${VER}_Linux_Portable.zip" NexarAlmacen/
          cd ..
          rm -rf portable_tmp
          echo "OK — ZIP portable Linux creado"

      - name: Construir paquete .deb
        run: |
          chmod +x build_deb.sh
          bash build_deb.sh

      - name: Copiar .deb a dist/
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          DEB="build_deb/nexar-almacen_${VER}_all.deb"
          if [ -f "$DEB" ]; then
            cp "$DEB" dist/
            echo "OK — .deb copiado"
          else
            echo "ERROR — .deb no encontrado"
            ls -la build_deb/ 2>/dev/null || echo "La carpeta build_deb no existe"
            exit 1
          fi

      - name: Generar SHA256SUMS_Linux.txt
        run: |
          cd dist
          sha256sum $(ls | grep -v SHA256SUMS) > SHA256SUMS_Linux.txt
          echo "--- SHA256SUMS Linux ---"
          cat SHA256SUMS_Linux.txt

      - name: Subir artefactos Linux
        uses: actions/upload-artifact@v4
        with:
          name: nexar-almacen-linux-${{ steps.ver.outputs.VERSION }}
          path: dist/
          retention-days: 30

  combine-checksums:
    name: Generar SHA256SUMS.txt final
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:

      - name: Descargar código
        uses: actions/checkout@v4

      - name: Leer versión
        id: ver
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Descargar artefactos Windows
        uses: actions/download-artifact@v4
        with:
          name: nexar-almacen-windows-${{ steps.ver.outputs.VERSION }}
          path: todos/

      - name: Descargar artefactos Linux
        uses: actions/download-artifact@v4
        with:
          name: nexar-almacen-linux-${{ steps.ver.outputs.VERSION }}
          path: todos/

      - name: Generar SHA256SUMS.txt combinado
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          cd todos
          echo "# Nexar Almacen v${VER} — SHA256 Checksums" > SHA256SUMS.txt
          echo "# Generado: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          for f in $(ls | grep -v "SHA256SUMS" | sort); do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            echo "$hash  $f" >> SHA256SUMS.txt
          done
          echo "--- SHA256SUMS.txt final ---"
          cat SHA256SUMS.txt

      - name: Subir SHA256SUMS.txt
        uses: actions/upload-artifact@v4
        with:
          name: nexar-almacen-checksums-${{ steps.ver.outputs.VERSION }}
          path: todos/SHA256SUMS.txt
          retention-days: 30