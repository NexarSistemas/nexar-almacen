name: Build & Release Multi-Platform

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: nexar-stock

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Obtener versión
      # =========================
      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=dev-${GITHUB_SHA::7}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # =========================
      # Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # =========================
      # Instalar dependencias
      # =========================
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # =========================
      # 🪟 WINDOWS
      # =========================
      - name: Build Windows portable
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed app.py --name $env:APP_NAME

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        run: |
          iscc build/windows/installer.iss

      - name: Collect Windows artifacts
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release
          copy dist\${env:APP_NAME}.exe release\${env:APP_NAME}-windows-portable-${env:VERSION}.exe
          copy Output\*.exe release\${env:APP_NAME}-windows-installer-${env:VERSION}.exe

      # =========================
      # 🐧 LINUX (UNIFICADO)
      # =========================
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev

      - name: Build Linux (portable + deb)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x build/linux/build.sh
          ./build/linux/build.sh

      - name: Collect Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release
          cp release/* .

      # =========================
      # 📦 Upload artifacts
      # =========================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: release/*

  # =============================
  # 🚀 RELEASE (solo con tag)
  # =============================
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}